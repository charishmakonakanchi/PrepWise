{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">
        Welcome, {{ current_user.username }} 👋
    </h2>

    <div class="row">

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Total Questions</h5>
                    <h2>{{ total_questions }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Bookmarks</h5>
                    <h2>{{ total_bookmarks }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Categories</h5>
                    <h2>{{ total_categories }}</h2>
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
