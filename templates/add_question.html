<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
</head>
<body>

    <h1>Add Interview Question</h1>

    <form method="POST">

        <label>Question Title</label><br>
        <input type="text" name="title" required><br><br>

        <label>Description</label><br>
        <textarea name="description" rows="5" cols="50" required></textarea><br><br>

        <label>Category</label><br>
        <input type="text" name="category" placeholder="DSA, DBMS, SQL..." required><br><br>

        <label>Difficulty</label><br>
        <select name="difficulty">
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
        </select><br><br>

        <label>Company</label><br>
        <input type="text" name="company"><br><br>

        <label>Solution</label><br>
        <textarea name="solution" rows="8" cols="50"></textarea><br><br>

        <button type="submit">Add Question</button>

    </form>

    <br>

    <a href="/questions">Back to Questions</a>

</body>
</html>
