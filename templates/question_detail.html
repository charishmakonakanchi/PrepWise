{% extends "base.html" %}

{% block content %}

<h2>{{ question.title }}</h2>

<p><strong>Category:</strong> {{ question.category.name }}</p>
<p><strong>Difficulty:</strong> {{ question.difficulty }}</p>
<p><strong>Company:</strong> {{ question.company }}</p>

<hr>

<h3>Answer</h3>

<p>{{ question.answer }}</p>

<!-- Bookmark Button -->
<br><br>

<a href="{{ url_for('questions.bookmark_question',
                    question_id=question.id) }}">
    ⭐ Bookmark this Question
</a>

<br><br>

<a href="{{ url_for('questions.questions') }}">
    ← Back to Question Bank
</a>

{% endblock %}
